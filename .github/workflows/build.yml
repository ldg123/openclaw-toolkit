name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: openclaw-toolkit-windows
            exe_name: openclaw-toolkit.exe
          - os: ubuntu-latest
            artifact_name: openclaw-toolkit-linux
            exe_name: openclaw-toolkit
          - os: macos-latest
            artifact_name: openclaw-toolkit-macos
            exe_name: openclaw-toolkit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name openclaw-toolkit --console openclaw_toolkit.py
          ls -la dist/

      - name: Build Linux executable
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x openclaw_toolkit.py
          pyinstaller --onefile --name openclaw-toolkit --console openclaw_toolkit.py
          ls -la dist/

      - name: Build macOS app
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x openclaw_toolkit.py
          pyinstaller --onefile --name openclaw-toolkit --console openclaw_toolkit.py
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.exe_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/openclaw-toolkit-windows/*
            artifacts/openclaw-toolkit-linux/*
            artifacts/openclaw-toolkit-macos/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.inputs.upload_url }}
          asset_path: artifacts/openclaw-toolkit-windows/openclaw-toolkit.exe
          asset_name: openclaw-toolkit-windows.exe
          asset_content_type: application/octet-stream
